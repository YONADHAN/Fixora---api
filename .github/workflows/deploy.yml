name: Fixora CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t yonadhan/fixora-api:latest .

      - name: Push image to DockerHub
        run: docker push yonadhan/fixora-api:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull yonadhan/fixora-api:latest

            docker stop fixora-api || true
            docker rm fixora-api || true

            docker run -d \
              -p 4000:4000 \
              --name fixora-api \
              --restart always \
              --env-file ~/Fixora---api/.env \
              yonadhan/fixora-api:latest