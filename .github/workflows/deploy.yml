name: Deploy Fixora API

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/Fixora---api
            git pull origin master

            docker stop fixora-api || true
            docker rm fixora-api || true

            docker build -t fixora-api .

            docker run -d \
              -p 4000:4000 \
              --name fixora-api \
              --restart always \
              --env-file .env \
              fixora-api